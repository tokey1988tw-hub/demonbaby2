<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>創世神修改器 - 書籤安裝</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 24px 16px 60px;
        background: #0f172a; color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        line-height: 1.7;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 20px; color: #38bdf8; margin: 0 0 6px; }
    h2 { font-size: 15px; color: #4ade80; margin: 28px 0 10px; border-left: 3px solid #4ade80; padding-left: 8px; }
    p.sub { color: #94a3b8; font-size: 13px; margin: 0 0 20px; }
    .bkmk-row { display: flex; align-items: center; gap: 10px; margin: 14px 0; flex-wrap: wrap; }
    a.bkmk {
        display: inline-block; background: #2563eb; color: #fff; text-decoration: none;
        font-weight: bold; padding: 10px 18px; border-radius: 8px; font-size: 14px;
        cursor: grab; border: 1px solid #3b82f6;
        white-space: nowrap;
    }
    a.bkmk:active { cursor: grabbing; }
    .hint { font-size: 12px; color: #64748b; }
</style>
</head>
<body>
<div class="wrap">
    <h1>🛠️ 創世神修改器書籤</h1>
    <p class="sub">把下面的按鈕拖到書籤列，之後在遊戲頁面點一下書籤即可開啟修改器面板。</p>

    <div class="bkmk-row">
        <a class="bkmk" id="bkmk-link" href="javascript:(function(){var o=document.getElementById('geo-mod-loader');if(o)o.remove();var s=document.createElement('script');s.id='geo-mod-loader';s.src='https://tokey1988tw-hub.github.io/demonbaby2/geo-mod.js?t='+Date.now();document.body.appendChild(s);})();">🛠️ 拖我到書籤列（開啟修改器）</a>
    </div>
    <div class="hint">找不到書籤列？先按 <b>Ctrl+Shift+B</b>顯示書籤列，再把上面按鈕拖過去。</div>
</div>
</body>
</html>
